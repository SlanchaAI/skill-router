name: Bug report
description: Report reproducible broken behavior
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include secrets, private prompts, or sensitive traces. Report vulnerabilities through SECURITY.md.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the behavior and what you expected.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest commands or steps that reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Docker and Compose versions, and Ingot commit. Redact credentials.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste only sanitized logs.
      render: shell
